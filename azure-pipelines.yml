trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerRegistry: 'sharanaregistry.azurecr.io'
  imageName: 'flask-app'
  acrServiceConnection: 'acr-service-connection'
  aksServiceConnection: 'aks-service-connection'

stages:

# ─── STAGE 1: BUILD & TEST ─────────────────────────
- stage: Build
  displayName: 'Build & Test'
  jobs:
  - job: BuildTest
    steps:

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.10'

    - script: |
        cd app
        pip install -r requirements.txt
        pip install pytest
      displayName: 'Install Dependencies'

    - script: |
        cd app
        pytest tests/ || echo "No tests found, skipping"
      displayName: 'Run Tests'

# ─── STAGE 2: DOCKER BUILD & PUSH ──────────────────
- stage: Containerize
  displayName: 'Build & Push Docker Image'
  dependsOn: Build
  jobs:
  - job: DockerBuildPush
    steps:
    - task: Docker@2
      displayName: 'Build and Push to ACR'
      inputs:
        containerRegistry: '$(acrServiceConnection)'
        repository: '$(imageName)'
        command: 'buildAndPush'
        Dockerfile: 'app/Dockerfile'     # ← Points to app/ folder
        buildContext: 'app/'             # ← Build context is app/
        tags: |
          $(Build.BuildId)
          latest

# ─── STAGE 3: DEPLOY TO AKS ────────────────────────
- stage: Deploy
  displayName: 'Deploy to AKS'
  dependsOn: Containerize
  jobs:
  - deployment: DeployAKS
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: KubernetesManifest@0
            displayName: 'Apply K8s Manifests'
            inputs:
              action: 'deploy'
              kubernetesServiceConnection: '$(aksServiceConnection)'
              namespace: 'default'
              manifests: |
                k8s/deployment.yaml
                k8s/service.yaml
              containers: '$(dockerRegistry)/$(imageName):$(Build.BuildId)'
