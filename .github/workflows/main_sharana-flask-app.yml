name: Build and deploy Python app to Azure Web App - sharana-flask-app
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt
      - name: Lint with flake8
        run: |
          cd app
          flake8 . --exclude=antenv,tests --max-line-length=100
      - name: Run tests with coverage
        run: |
          cd app
          pytest tests/ -v --cov=. --cov-report=term-missing
      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            app/
            !app/antenv/
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9A657C40A1DC41CAB5C2C522A53B98E3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_83C73D733064451AB9CD3A1FEC6D87B8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_20A3350F64544FE2B41426F7CB7E3099 }}
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sharana-flask-app'
          slot-name: 'Production'
          package: .
