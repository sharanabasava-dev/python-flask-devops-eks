apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
      - name: flask
        image: 897729139530.dkr.ecr.ap-south-1.amazonaws.com/flask-devops:latest
        ports:
        - containerPort: 5000
